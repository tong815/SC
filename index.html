<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A Grade 7 math practice hub with topic-based multiple-choice questions."
    />
    <title>Exam Visualizer</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="header-content">
        <p class="eyebrow">Interactive practice</p>
        <h1>Grade 7 Math Practice</h1>
        <p class="subtitle">
          Choose a topic, answer practice questions, and read instant feedback.
        </p>
      </div>
    </header>

    <main class="page-content">
      <section id="topic-hub" class="topic-hub" aria-labelledby="topic-hub-title">
        <div class="topic-hub-heading">
          <p class="section-label">Choose a topic</p>
          <h2 id="topic-hub-title">Practice hub</h2>
        </div>

        <div id="topic-list" class="topic-list" aria-live="polite">
          <p class="loading-message">Loading topics...</p>
        </div>
      </section>

      <section
        id="practice-view"
        class="practice-view"
        aria-labelledby="question-list-title"
        hidden
      >
        <button id="back-to-topics" class="back-button" type="button">
          Back to Topics
        </button>

        <div class="exam-overview">
          <div>
            <p class="section-label">Multiple choice</p>
            <h2 id="question-list-title">Question set</h2>
          </div>
          <p id="question-count" class="question-count" aria-live="polite"></p>
        </div>

        <div id="question-list" class="question-list" aria-live="polite"></div>
      </section>

      <div id="error-message" class="error-message" role="alert" hidden></div>
    </main>

    <footer class="site-footer">
      <p>Questions are loaded from the JSON data layer.</p>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
